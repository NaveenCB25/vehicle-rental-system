<!DOCTYPE html>
<html>
<head>
    <title>Vehicles</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Available Vehicles</h1>

<div id="vehicleList"></div>

<script src="js/app.js"></script>

</body>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Optional Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">🚗 Available Vehicles</h2>

    <div id="vehicleList" class="row g-4"></div>
</div>

<script>
fetch("http://localhost:5000/api/vehicles")
.then(res => res.json())
.then(data => {
    const container = document.getElementById("vehicleList");

    data.forEach(v => {
        container.innerHTML += `
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <img src="${v.image}" class="card-img-top" style="height:200px; object-fit:cover;">
                
                <div class="card-body">
                    <h5 class="card-title">${v.name}</h5>
                    <p class="card-text">Type: ${v.type}</p>
                    <p class="card-text fw-bold text-success">₹ ${v.price}</p>
                    
                    <button class="btn btn-primary w-100"
                        onclick="bookVehicle('${v.name}')">
                        🚀 Book Now
                    </button>
                </div>
            </div>
        </div>`;
    });
});

function bookVehicle(name) {
    localStorage.setItem("selectedVehicle", name);
    window.location.href = "booking.html";
}
</script>

</body>

</html>
