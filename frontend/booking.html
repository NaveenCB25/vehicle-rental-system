<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>
</head>
<body>

<h2>Booking Page</h2>

<p id="bookingInfo"></p>

<button onclick="goToPayment()">Proceed to Payment</button>

<script>
const vehicle = localStorage.getItem("selectedVehicle");
document.getElementById("bookingInfo").innerText = "Booking: " + vehicle;

function goToPayment() {
    window.location.href = "payment.html";
}
</script>

</body>
</html>
