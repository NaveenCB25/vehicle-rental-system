<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Create account</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">


<script>
function login() {
  fetch("http://localhost:5000/api/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(data => {
    localStorage.setItem("token", data.token);

    if (data.role === "admin") {
      window.location.href = "admin.html";
    } else {
      window.location.href = "dashboard.html";
    }
  });
}
</script>

<form onsubmit="loginUser(event)">
    <input type="text" id="username" placeholder="Enter Name" required><br><br>
    <button type="submit">Register</button>
</form>

<script>
function loginUser(e) {
    e.preventDefault();
    const name = document.getElementById("username").value;
    localStorage.setItem("user", name);
    window.location.href = "dashboard.html";
}
</script>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
  <div class="card p-4 shadow" style="width:350px;">
    
    <h3 class="text-center mb-3">Login</h3>

    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" class="form-control mb-3" type="password" placeholder="Password">

    <button onclick="login()" class="btn btn-primary w-100">Login</button>

  </div>
</div>

<script>
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  fetch("http://localhost:5000/api/auth/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  })
  .then(res => res.json())
  .then(data => {
    if (data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("role", data.role);

      if (data.role === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "dashboard.html";
      }
    } else {
      alert(data.message);
    }
  });
}
</script>

</body>

</body>

</html>
